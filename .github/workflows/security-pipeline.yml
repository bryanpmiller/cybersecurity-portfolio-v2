name: DevSecOps

# Trigger this pipeline on every push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          # We tell the action wrapper itself to look at the workspace directory root
          path: ./
          # We pass ONLY valid global engine flags to extra_args
          extra_args: --only-verified

  sast-scan:
    name: Static Application Security Testing (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan # Only run SAST if secret scanning passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep Security Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit # Enterprise-grade open-source security ruleset
