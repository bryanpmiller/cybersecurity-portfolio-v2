name: DevSecOps Portfolio Pipeline

# Trigger this pipeline on every push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Still get history, but we change how we scan it below

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # We remove the base/head restriction and pass a flag to scan the git history cleanly
          extra_args: --only-verified --directory

  sast-scan:
    name: Static Application Security Testing (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan # Only run SAST if secret scanning passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep Security Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit # Enterprise-grade open-source security ruleset